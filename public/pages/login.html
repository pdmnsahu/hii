<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediStore — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --teal: #0d9488; --teal-dark: #0f766e; --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0; --border2: #cbd5e1; --text: #1e293b; --muted: #94a3b8; --danger: #ef4444; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .bg-pattern { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(13,148,136,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(13,148,136,0.04) 1px, transparent 1px); background-size: 40px 40px; }
    .card { position: relative; z-index: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px; width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 36px; }
    .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--teal), #0891b2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .logo-text { font-size: 22px; font-weight: 700; color: var(--text); }
    .logo-text span { color: var(--teal); }
    h1 { font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    p.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.04em; }
    input { width: 100%; background: #f8fafc; border: 1px solid var(--border2); border-radius: 10px; padding: 12px 16px; font-family: 'Sora', sans-serif; font-size: 14px; color: var(--text); transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(13,148,136,0.12); }
    .btn { width: 100%; background: var(--teal); border: none; border-radius: 10px; padding: 14px; font-family: 'Sora', sans-serif; font-size: 15px; font-weight: 600; color: white; cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s; box-shadow: 0 2px 8px rgba(13,148,136,0.3); }
    .btn:hover { background: var(--teal-dark); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: var(--danger); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
    .hint { text-align: center; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .hint code { background: rgba(13,148,136,0.10); color: var(--teal); padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="card">
    <div class="logo"><div class="logo-icon">💊</div><div class="logo-text">Medi<span>Store</span></div></div>
    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your pharmacy dashboard</p>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Enter username" autocomplete="username"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter password" autocomplete="current-password"></div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="hint">Demo credentials: <code>admin</code> / <code>admin123</code></div>
  </div>
  <script>
    document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
    async function doLogin() {
      const btn = document.getElementById('loginBtn'), errEl = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim(), password = document.getElementById('password').value;
      if (!username || !password) { showError('Please enter username and password'); return; }
      btn.disabled = true; btn.textContent = 'Signing in...'; errEl.style.display = 'none';
      try {
        const res = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await res.json();
        if (data.success) { window.location.href = '/'; } else { showError(data.error || 'Login failed'); }
      } catch(e) { showError('Connection error. Please try again.'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    }
    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
  </script>
</body>
</html>
